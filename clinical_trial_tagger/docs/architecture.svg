<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 650" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1020" height="650" fill="#ffffff"/>

  <!-- Client -->
  <rect x="410" y="20" width="200" height="50" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="510" y="50" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Client / API caller</text>
  <line x1="510" y1="70" x2="510" y2="100" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- FastAPI container -->
  <rect x="40" y="100" width="940" height="110" rx="8" fill="#f5f7fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="60" y="122" font-size="14" font-weight="bold" fill="#1e293b">FastAPI App  (app/main.py)</text>

  <rect x="60" y="135" width="140" height="50" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="130" y="165" text-anchor="middle" font-size="12" fill="#1e293b">GET /health</text>

  <rect x="220" y="135" width="140" height="50" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="290" y="165" text-anchor="middle" font-size="12" fill="#1e293b">POST /ingest</text>

  <rect x="380" y="135" width="150" height="50" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="455" y="158" text-anchor="middle" font-size="12" fill="#1e293b">GET/POST</text>
  <text x="455" y="174" text-anchor="middle" font-size="12" fill="#1e293b">/categories</text>

  <rect x="550" y="135" width="160" height="50" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="630" y="165" text-anchor="middle" font-size="12" fill="#1e293b">POST /inference</text>

  <rect x="730" y="135" width="210" height="50" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="835" y="165" text-anchor="middle" font-size="12" fill="#1e293b">POST /collections/manage</text>

  <text x="130" y="200" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">(checks Weaviate, Embedder, Claude)</text>
  <text x="835" y="200" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">(also validates category via CategoryRegistry)</text>

  <!-- Core Services container -->
  <rect x="60" y="250" width="430" height="230" rx="8" fill="#f5f7fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="80" y="272" font-size="14" font-weight="bold" fill="#1e293b">Core Services  (app/core/)</text>
  <text x="80" y="300" font-size="12" fill="#1e293b">• PDFExtractor — Docling: PDF → markdown</text>
  <text x="80" y="327" font-size="12" fill="#1e293b">• Chunker — head/tail page sampling</text>
  <text x="80" y="354" font-size="12" fill="#1e293b">• Embedder — jinaai/jina-embeddings-v3</text>
  <text x="80" y="381" font-size="12" fill="#1e293b">• CategoryRegistry — categories.json</text>
  <text x="80" y="408" font-size="12" fill="#1e293b">• chunk_writer — chunks_debug/ (ingest QA)</text>
  <text x="80" y="435" font-size="12" fill="#1e293b">• tagger — tagged_files/ (inference output)</text>

  <!-- LangGraph Agent container -->
  <rect x="530" y="250" width="430" height="230" rx="8" fill="#f5f7fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="550" y="272" font-size="14" font-weight="bold" fill="#1e293b">LangGraph Agent  (app/agent/)</text>
  <text x="550" y="305" font-size="12" fill="#1e293b">agent_graph:</text>
  <text x="550" y="332" font-size="12" fill="#1e293b">extractor → retriever → classifier</text>
  <text x="550" y="359" font-size="12" fill="#1e293b">⇄ deep_reader  (at most one pass)</text>
  <text x="550" y="386" font-size="12" fill="#1e293b">→ finalizer (Claude + hybrid_search tool)</text>
  <text x="550" y="420" font-size="10" font-style="italic" fill="#64748b">See inference_flow.svg for full node detail</text>

  <!-- Data / output row -->
  <rect x="60" y="520" width="260" height="90" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="190" y="546" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">Weaviate</text>
  <text x="190" y="568" text-anchor="middle" font-size="11" fill="#1e293b">ClinicalTrialChunk collection</text>
  <text x="190" y="588" text-anchor="middle" font-size="11" fill="#1e293b">(embedded or Docker)</text>

  <rect x="360" y="520" width="260" height="90" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="490" y="546" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">Anthropic Claude</text>
  <text x="490" y="568" text-anchor="middle" font-size="11" fill="#1e293b">claude-haiku-4-5</text>
  <text x="490" y="588" text-anchor="middle" font-size="11" fill="#1e293b">(finalizer reasoning)</text>

  <rect x="660" y="520" width="300" height="90" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="810" y="546" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">Runtime Files</text>
  <text x="810" y="568" text-anchor="middle" font-size="11" fill="#1e293b">chunks_debug/, tagged_files/,</text>
  <text x="810" y="588" text-anchor="middle" font-size="11" fill="#1e293b">categories.json</text>

  <!-- Route -> service arrows -->
  <line x1="290" y1="185" x2="240" y2="250" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="455" y1="185" x2="400" y2="250" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="630" y1="185" x2="650" y2="250" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- collections -> Weaviate (dashed elbow, routes around the outside) -->
  <polyline points="835,185 990,185 990,565 320,565" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="960" y="380" font-size="10" font-style="italic" fill="#64748b" transform="rotate(90 990 380)" text-anchor="middle">stats / purge / list_files / delete</text>

  <!-- Core Services -> Weaviate / Runtime Files -->
  <line x1="200" y1="480" x2="180" y2="520" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="130" y="500" font-size="10" font-style="italic" fill="#64748b">writes chunks + vectors</text>

  <line x1="400" y1="480" x2="700" y2="520" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LangGraph Agent -> Weaviate / Claude / Runtime Files -->
  <line x1="600" y1="480" x2="280" y2="520" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="470" y="500" font-size="10" font-style="italic" fill="#64748b">hybrid search</text>

  <line x1="745" y1="480" x2="530" y2="520" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="660" y="500" font-size="10" font-style="italic" fill="#64748b">reasoning</text>

  <line x1="890" y1="480" x2="850" y2="520" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
