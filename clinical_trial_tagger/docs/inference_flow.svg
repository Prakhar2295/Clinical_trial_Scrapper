<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 1000" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="1000" fill="#ffffff"/>

  <!-- START -->
  <circle cx="380" cy="35" r="25" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="380" y="40" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">START</text>
  <line x1="380" y1="60" x2="380" y2="88" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- extractor_node -->
  <rect x="120" y="90" width="520" height="90" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="380" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">extractor_node</text>
  <text x="380" y="138" text-anchor="middle" font-size="11" fill="#1e293b">Docling: first MAX_PAGES_INITIAL pages</text>
  <text x="380" y="158" text-anchor="middle" font-size="11" fill="#1e293b">→ extracted_text, chunks</text>
  <line x1="380" y1="180" x2="380" y2="208" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- retriever_node -->
  <rect x="120" y="210" width="520" height="90" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="380" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">retriever_node</text>
  <text x="380" y="258" text-anchor="middle" font-size="11" fill="#1e293b">embed chunks → Weaviate hybrid search</text>
  <text x="380" y="278" text-anchor="middle" font-size="11" fill="#1e293b">(per head/tail chunk_position) → retrieved_chunks</text>
  <line x1="380" y1="300" x2="380" y2="328" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- classifier_node -->
  <rect x="120" y="330" width="520" height="90" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="380" y="355" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">classifier_node</text>
  <text x="380" y="378" text-anchor="middle" font-size="11" fill="#1e293b">vote-count retrieved_chunks by category</text>
  <text x="380" y="398" text-anchor="middle" font-size="11" fill="#1e293b">→ vote_counts, confidence, predicted_category</text>
  <line x1="380" y1="420" x2="380" y2="448" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- decision diamond -->
  <polygon points="380,450 560,510 380,570 200,510" fill="#f5f7fa" stroke="#334155" stroke-width="1.5"/>
  <text x="380" y="505" text-anchor="middle" font-size="11" fill="#1e293b">confidence ≥</text>
  <text x="380" y="521" text-anchor="middle" font-size="11" fill="#1e293b">CONFIDENCE_THRESHOLD?</text>

  <!-- diamond -> deep_reader (left) -->
  <line x1="200" y1="510" x2="200" y2="648" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="95" y="585" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">no, fallback</text>
  <text x="95" y="598" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">not yet used</text>

  <!-- diamond -> finalizer (right, "yes") -->
  <line x1="560" y1="510" x2="500" y2="648" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="565" y="590" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">yes</text>

  <!-- diamond -> finalizer (bottom elbow, "fallback already used") -->
  <polyline points="380,570 380,610 600,610 600,648" fill="none" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="490" y="604" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">no, fallback already used</text>

  <!-- deep_reader_node -->
  <rect x="40" y="650" width="320" height="120" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="200" y="675" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">deep_reader_node</text>
  <text x="200" y="698" text-anchor="middle" font-size="10.5" fill="#1e293b">re-extract up to MAX_PAGES_FALLBACK pages</text>
  <text x="200" y="718" text-anchor="middle" font-size="10.5" fill="#1e293b">merge chunks, set fallback_triggered=True</text>
  <text x="200" y="742" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">(runs at most once — enforced even on error)</text>

  <!-- finalizer_node -->
  <rect x="420" y="650" width="300" height="120" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="570" y="675" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">finalizer_node</text>
  <text x="570" y="698" text-anchor="middle" font-size="10.5" fill="#1e293b">langchain create_agent (Claude Haiku)</text>
  <text x="570" y="718" text-anchor="middle" font-size="10.5" fill="#1e293b">+ hybrid_search tool</text>
  <text x="570" y="740" text-anchor="middle" font-size="10.5" fill="#1e293b">→ final_category, final_confidence, reasoning</text>

  <!-- deep_reader loops back to retriever -->
  <polyline points="40,710 15,710 15,255 118,255" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow2)"/>
  <text x="15" y="480" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b" transform="rotate(-90 15 480)">loop back (rebuild retrieval with merged chunks)</text>

  <!-- finalizer -> tag write -->
  <line x1="570" y1="770" x2="570" y2="798" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- tag write -->
  <rect x="420" y="800" width="300" height="80" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="570" y="826" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">write_tagged_file()</text>
  <text x="570" y="848" text-anchor="middle" font-size="11" fill="#1e293b">copies PDF → tagged_files/</text>
  <text x="570" y="866" text-anchor="middle" font-size="11" fill="#1e293b">+ _meta.json sidecar</text>

  <line x1="570" y1="880" x2="570" y2="908" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- END -->
  <rect x="470" y="910" width="200" height="60" rx="30" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="570" y="935" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">END</text>
  <text x="570" y="953" text-anchor="middle" font-size="10.5" fill="#1e293b">/ HTTP response</text>
</svg>
